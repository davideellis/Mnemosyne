AWSTemplateFormatVersion: "2010-09-09"
Description: Mnemosyne single-user encrypted sync service

Parameters:
  ServiceName:
    Type: String
    Default: mnemosyne
  BootstrapEmail:
    Type: String
    Description: Email used for the initial hosted-style account bootstrap flow.
  EnableHostedBootstrap:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
  LambdaArtifactBucket:
    Type: String
    Description: S3 bucket containing the packaged sync API Lambda artifact zip.
  LambdaArtifactKey:
    Type: String
    Description: S3 key for the packaged sync API Lambda artifact zip.

Conditions:
  HostedBootstrapEnabled: !Equals [!Ref EnableHostedBootstrap, "true"]

Resources:
  NotesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  MetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SyncApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MnemosyneSyncApiPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource: !GetAtt MetadataTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt NotesBucket.Arn
                  - !Sub "${NotesBucket.Arn}/*"

  SyncApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-sync-api"
      Runtime: provided.al2023
      Architectures:
        - arm64
      Handler: bootstrap
      Role: !GetAtt SyncApiRole.Arn
      MemorySize: 512
      Timeout: 15
      Environment:
        Variables:
          MNEMOSYNE_DDB_TABLE: !Ref MetadataTable
          MNEMOSYNE_NOTES_BUCKET: !Ref NotesBucket
          MNEMOSYNE_BOOTSTRAP_EMAIL: !Ref BootstrapEmail
          MNEMOSYNE_ENABLE_HOSTED_BOOTSTRAP: !Ref EnableHostedBootstrap
          MNEMOSYNE_AWS_MODE: lambda
      Code:
        S3Bucket: !Ref LambdaArtifactBucket
        S3Key: !Ref LambdaArtifactKey

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ServiceName}-http-api"
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SyncApiFunction.Arn
      PayloadFormatVersion: "2.0"

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SyncApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

Outputs:
  ApiBaseUrl:
    Value: !GetAtt HttpApi.ApiEndpoint
  BucketName:
    Value: !Ref NotesBucket
  MetadataTableName:
    Value: !Ref MetadataTable
  BootstrapMode:
    Value: !If [HostedBootstrapEnabled, "hosted-style", "single-account local-admin"]
