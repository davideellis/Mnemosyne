name: mnemosyne
description: Local-first encrypted notes for personal device sync.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  flutter_markdown_plus: ^1.0.7
  http: ^1.5.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
